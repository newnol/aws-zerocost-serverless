<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Task Manager</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
            rel="stylesheet"
        />
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            primary: "#4f46e5",
                            secondary: "#10b981",
                        },
                    },
                },
            };
        </script>
    </head>
    <body class="bg-gray-50 min-h-screen text-gray-800 font-sans">
        <nav class="bg-primary text-white shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center space-x-3">
                        <i class="fa-solid fa-list-check text-2xl"></i>
                        <span class="font-bold text-xl tracking-wide"
                            >Task Manager</span
                        >
                    </div>
                    <div>
                        <span
                            class="text-sm bg-indigo-700 px-3 py-1 rounded-full"
                            ><i class="fa-regular fa-user mr-2"></i
                            >user123</span
                        >
                    </div>
                </div>
            </div>
        </nav>

        <main
            class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 md:grid-cols-3 gap-8"
        >
            <!-- Form Section -->
            <div class="md:col-span-1">
                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 sticky top-8"
                >
                    <h2
                        class="text-xl font-semibold mb-6 text-gray-700 flex items-center border-b pb-3"
                    >
                        <i
                            class="fa-solid fa-pen-to-square mr-2 text-primary"
                        ></i>
                        <span id="form-title">Add New Task</span>
                    </h2>

                    <div id="task-form" class="space-y-4">
                        <input type="hidden" id="taskId" />

                        <div>
                            <label
                                for="title"
                                class="block text-sm font-medium text-gray-700 mb-1"
                                >Title
                                <span class="text-red-500">*</span></label
                            >
                            <input
                                type="text"
                                id="title"
                                required
                                placeholder="e.g. Finish report"
                                class="w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
                            />
                        </div>

                        <div>
                            <label
                                for="description"
                                class="block text-sm font-medium text-gray-700 mb-1"
                                >Description</label
                            >
                            <textarea
                                id="description"
                                rows="3"
                                placeholder="Task details..."
                                class="w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all resize-none"
                            ></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label
                                    for="priority"
                                    class="block text-sm font-medium text-gray-700 mb-1"
                                    >Priority</label
                                >
                                <select
                                    id="priority"
                                    class="w-full rounded-md border border-gray-300 px-3 py-2 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                >
                                    <option value="low">Low</option>
                                    <option value="medium" selected>
                                        Medium
                                    </option>
                                    <option value="high">High</option>
                                </select>
                            </div>
                            <div>
                                <label
                                    for="status"
                                    class="block text-sm font-medium text-gray-700 mb-1"
                                    >Status</label
                                >
                                <select
                                    id="status"
                                    class="w-full rounded-md border border-gray-300 px-3 py-2 bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                >
                                    <option value="pending" selected>
                                        Pending
                                    </option>
                                    <option value="done">Done</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label
                                for="dueDate"
                                class="block text-sm font-medium text-gray-700 mb-1"
                                >Due Date</label
                            >
                            <input
                                type="date"
                                id="dueDate"
                                class="w-full rounded-md border border-gray-300 px-3 py-2 text-gray-900 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                            />
                        </div>

                        <div class="pt-4 flex space-x-3">
                            <button
                                id="submit-btn"
                                onclick="saveTask()"
                                class="flex-1 bg-primary hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-md transition-colors shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary"
                            >
                                Save Task
                            </button>
                            <button
                                onclick="clearForm()"
                                class="flex-1 bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 font-medium py-2 px-4 rounded-md transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-gray-200"
                            >
                                <i class="fa-solid fa-xmark mr-2"></i>Clear
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Task List Section -->
            <div class="md:col-span-2">
                <div
                    class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 min-h-[500px]"
                >
                    <div
                        class="flex justify-between items-center mb-6 border-b pb-3"
                    >
                        <h2
                            class="text-xl font-semibold text-gray-700 flex items-center"
                        >
                            <i
                                class="fa-solid fa-layer-group mr-2 text-primary"
                            ></i>
                            My Tasks
                        </h2>
                        <div class="text-sm text-gray-500">
                            <span id="task-count">0</span> tasks total
                        </div>
                    </div>

                    <div id="tasks-container" class="space-y-4">
                        <!-- Loading state skeleton -->
                        <div class="animate-pulse space-y-4">
                            <div class="h-24 bg-gray-100 rounded-lg"></div>
                            <div class="h-24 bg-gray-100 rounded-lg"></div>
                            <div class="h-24 bg-gray-100 rounded-lg"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Success/Error Toast Notification (Hidden by default) -->
        <div
            id="toast"
            class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 flex items-center p-4 mb-4 text-gray-500 bg-white rounded-lg shadow-lg border-l-4 border-green-500"
            role="alert"
        >
            <div
                class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 text-green-500 bg-green-100 rounded-lg"
            >
                <i class="fa-solid fa-check"></i>
            </div>
            <div class="ml-3 text-sm font-normal" id="toast-message">
                Action completed successfully.
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
